# Nexora-dz
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متجري المتطور</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0b1220,#1e293b);
color:white;
direction:rtl;
}

header{
background:#00f5ff;
color:black;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
background:#111a2e;
width:250px;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{transform:scale(1.05);}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.content{
padding:10px;
text-align:center;
}

.price{color:#00f5ff;font-weight:bold;}

/* نافذة الطلب */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.box{
background:white;
color:black;
padding:20px;
border-radius:10px;
width:300px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
}

button{
width:100%;
padding:10px;
background:#00f5ff;
border:none;
cursor:pointer;
font-weight:bold;
}

button:hover{background:#00c2cc;}

/* لوحة الطلبات */
.admin{
position:fixed;
bottom:10px;
left:10px;
background:#00f5ff;
color:black;
padding:10px;
cursor:pointer;
font-weight:bold;
border-radius:10px;
}
</style>
</head>

<body>

<header>🛒 متجر متطور</header>

<div class="container" id="products"></div>

<!-- نافذة الطلب -->
<div class="modal" id="modal">
<div class="box">

<h3 id="pname"></h3>
<p id="pprice"></p>

<input id="name" placeholder="الاسم">
<input id="phone" placeholder="الهاتف">
<input id="city" placeholder="الولاية">

<button onclick="sendOrder()">إرسال الطلب</button>
<button onclick="closeModal()">إغلاق</button>

</div>
</div>

<div class="admin" onclick="showOrders()">
📦 الطلبات
</div>

<script>

// منتجات جاهزة (يمكنك تعديلها فقط هنا)
let products = [
{name:"منتج 1", price:"2000 دج", img:"https://via.placeholder.com/300x200"},
{name:"منتج 2", price:"3500 دج", img:"https://via.placeholder.com/300x200"},
{name:"منتج 3", price:"5000 دج", img:"https://via.placeholder.com/300x200"}
];

// عرض المنتجات
let container = document.getElementById("products");

products.forEach((p,i)=>{
container.innerHTML += `
<div class="card" onclick="openModal(${i})">
<img src="${p.img}">
<div class="content">
<h3>${p.name}</h3>
<p class="price">${p.price}</p>
</div>
</div>`;
});

let selectedProduct="";

function openModal(i){
selectedProduct = products[i];
document.getElementById("pname").innerText = selectedProduct.name;
document.getElementById("pprice").innerText = selectedProduct.price;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

// حفظ الطلبات محليًا
function sendOrder(){
let order = {
product:selectedProduct.name,
price:selectedProduct.price,
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
city:document.getElementById("city").value
};

let orders = JSON.parse(localStorage.getItem("orders") || "[]");
orders.push(order);
localStorage.setItem("orders", JSON.stringify(orders));

alert("تم إرسال الطلب بنجاح ✔️");
closeModal();
}

// عرض الطلبات (لك أنت فقط)
function showOrders(){
let orders = JSON.parse(localStorage.getItem("orders") || "[]");

let text = "الطلبات:\n\n";

orders.forEach(o=>{
text += `المنتج: ${o.product}
الاسم: ${o.name}
الهاتف: ${o.phone}
المدينة: ${o.city}
-----------------\n`;
});

alert(text);
}

</script>

</body>
</html>
