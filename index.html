# Nexora-dz
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متجري الإلكتروني</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0b1220,#1e293b);
color:white;
direction:rtl;
}

header{
background:#00f5ff;
color:black;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:30px;
}

.card{
background:#111a2e;
width:250px;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 15px rgba(0,0,0,0.5);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.content{
padding:15px;
text-align:center;
}

.price{
color:#00f5ff;
font-size:18px;
margin:10px 0;
font-weight:bold;
}

button{
width:100%;
padding:10px;
background:#00f5ff;
border:none;
cursor:pointer;
font-weight:bold;
border-radius:0 0 15px 15px;
}

button:hover{
background:#00c2cc;
}
</style>
</head>

<body>

<header>
🛒 متجري الإلكتروني
</header>

<div class="container">

<div class="card">
<img src="https://via.placeholder.com/300x200">
<div class="content">
<h3>منتج 1</h3>
<p class="price">2000 دج</p>
</div>
<button>شراء</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200">
<div class="content">
<h3>منتج 2</h3>
<p class="price">3500 دج</p>
</div>
<button>شراء</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200">
<div class="content">
<h3>منتج 3</h3>
<p class="price">5000 دج</p>
</div>
<button>شراء</button>
</div>

</div>

</body>
</html>
