# Nexora-dz
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متجري الاحترافي</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
direction:rtl;
}

header{
background:#00f5ff;
color:black;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.card{
background:#111a2e;
width:220px;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#00f5ff;
font-weight:bold;
margin:5px 0;
}

/* نافذة الطلب */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
color:black;
padding:20px;
border-radius:10px;
width:300px;
}

input{
width:100%;
margin:5px 0;
padding:8px;
}

button{
width:100%;
padding:10px;
background:#00f5ff;
border:none;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<header>🛒 متجري الاحترافي</header>

<div class="container">

<!-- منتج -->
<div class="card" onclick="openForm('منتج 1')">
<img src="https://via.placeholder.com/250">
<h3>منتج 1</h3>
<p class="price">2000 دج</p>
</div>

</div>

<!-- نافذة الطلب -->
<div class="modal" id="modal">
<div class="modal-content">

<h3 id="productName">طلب المنتج</h3>

<input type="text" placeholder="الاسم">
<input type="text" placeholder="رقم الهاتف">
<input type="text" placeholder="الولاية">

<button onclick="alert('تم إرسال الطلب')">إرسال الطلب</button>
<button onclick="closeForm()">إغلاق</button>

</div>
</div>

<script>
function openForm(product){
document.getElementById('modal').style.display='flex';
document.getElementById('productName').innerText=product;
}

function closeForm(){
document.getElementById('modal').style.display='none';
}
</script>

</body>
</html>
